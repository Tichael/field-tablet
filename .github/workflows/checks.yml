name: Checks

on:
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npx prettier --check .

      - name: Run Linter
        run: npm run lint

      - name: Type Check
        run: npx tsc -b
